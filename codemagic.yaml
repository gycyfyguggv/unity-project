workflows:
  ios-workflow:
    name: Build iOS
    environment:
      unity: 2022.3.20f1
      xcode: latest
    scripts:
      - name: Build Unity project
        script: |
          /Applications/Unity/Hub/Editor/2022.3.20f1/Unity.app/Contents/MacOS/Unity \
            -batchmode -nographics -quit \
            -projectPath $CM_PROJECT_DIR \
            -executeMethod BuildScript.BuildIOS \
            -logFile unity_build.log

      - name: Build Xcode project
        script: |
          cd build/ios
          xcodebuild -scheme Unity-iPhone -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO build