workflows:
  unity-ios-build:
    name: Unity iOS Build

    environment:
      unity: 2022.3.10f1
      xcode: latest

    scripts:
      - name: Activate Unity
        script: |
          echo "Unity starting..."

      - name: Build Unity project
        script: |
          unity-editor \
          -batchmode \
          -quit \
          -projectPath . \
          -executeMethod BuildScript.BuildIOS \
          -logFile -

      - name: Build Xcode project
        script: |
          cd build/ios
          xcodebuild \
          -scheme Unity-iPhone \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          build

    artifacts:
      - build/ios/build/Release-iphoneos/*.app